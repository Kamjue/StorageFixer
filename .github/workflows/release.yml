name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    uses: ./.github/workflows/android.yml
    with:
      gradle-task: "assembleRelease"
      upload-artifact: true
      artifact-name: app-release
      artifact-path: app/build/outputs/apk/release/*.apk
      create-release: true
